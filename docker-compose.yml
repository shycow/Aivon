version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: aivon_postgres
    environment:
      POSTGRES_USER: aivon
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aivon_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aivon_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
